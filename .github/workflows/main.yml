name: Sync KernelSU-Next Files

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout your empty repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Clone KernelSU-Next Source
        run: |
          # سحب مستودع KernelSU-Next بالكامل (فرع next)
          git clone -b next https://github.com/KernelSU-Next/KernelSU-Next.git temp_ksu
          
          # نقل مجلد الـ kernel فقط إلى مستودعك (أو الملفات التي تريدها)
          cp -r temp_ksu/kernel/* .
          
          # حذف المجلد المؤقت
          rm -rf temp_ksu

      - name: Push files to your repo
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add .
          git commit -m "Add KernelSU-Next files from source" || echo "No changes to commit"
          git push
