name: Sync KernelSU-Next Files

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout your repo
        uses: actions/checkout@v4

      - name: Fetch and Run Setup Script
        run: |
          # ملاحظة: تم تغيير الفرع إلى main لأن next غير موجود حالياً في المستودع الرسمي
          # إذا كنت تريد نسخة الـ legacy كما طلبت:
          curl -LSs "https://raw.githubusercontent.com/rifscc/KernelSU-Next/main/kernel/setup.sh" | bash -s legacy
          
          # إذا كنت تريد سحب الملفات يدوياً بعد تشغيل السكريبت
          # يمكنك إضافة أوامر إضافية هنا إذا لزم الأمر

      - name: Push updates to your repo
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add .
          git commit -m "Sync KernelSU-Next legacy files" || echo "No changes to commit"
          git push
